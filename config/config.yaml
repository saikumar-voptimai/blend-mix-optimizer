# ── Default target blend quantity (MT) ────────────────────────────
default_target_qty: 3800.0

# ── Fallback price if ore not listed below (₹/MT) ─────────────────
fallback_price: 5000.0

# ── Default ore prices (₹/MT) ─────────────────────────────────────
ore_prices:
  NMDC ROM:               8739.0
  NMDC Donimalai:         5684.0
  Bacheli Fines O/S:     10000.0
  Lloyds Pellet (Sarda):  9650.0
  Lloyds Fines O/S:       6162.0
  Lloyds CLO:             8051.0
  JRS Ventures CLO:       6831.0
  Jayaswal Neco:          6650.0
  Gomti CLO:              5349.0
  Titani Ferrous CLO:     4939.0
  Geomin CLO:             3827.0
  Acore Industries:       8473.0
  Sinter (SP-02):         5282.0

# ── Fe Production constraint ─────────────────────────────────────
# Minimum Fe units produced by the blend (MT)
# Formula: Σ(ore_qty_i × effective_fe_i / 100) ≥ min_fe_production_mt
# Effective Fe = Fe(T)% + FeO%×0.7773 (FeO counted separately for Sinter)
# Example: 4 ores at 3800 MT target → Fe prod = sum of each ore's Fe contribution
min_fe_production_mt: 2300.0

# ── Fe Loss Constant ──────────────────────────────────────────────
# Fixed Fe% points subtracted from gross blend Fe% to get net Fe%
# arriving in hot metal after losses via flue dust, GCP dust, slag FeO
# Source: BF-02 Fe Balance Report Feb-26 actuals (avg of 7 full days)
#   Dust Fe loss : ~19-27 MT/day  (~96% of total loss)
#   Slag FeO Fe  : ~1.8-2.5 MT/day (~4% of total loss)
#   Combined     : ~0.989% of ore Fe input = 0.56 percentage points
# Formula: net_fe_pct = gross_fe_pct - fe_loss_constant
# Update monthly using fresh Fe Balance Report data
fe_loss_constant: 0.56

# ── Sinter constraints (fraction of total blend) ───────────────────
sinter_min_pct: 0.50      # Sinter must be at least 50% of blend
sinter_max_pct: 0.65      # Sinter cannot exceed 65% of blend


# ── Slag chemistry correction factors ─────────────────────────────
# feo_in_slag:  FeO% that remains in slag (not reduced to Fe metal)
#               Subtracts from effective Fe calculation
# si_in_slag:   Si% that remains unreduced in slag as SiO2
#               Its SiO2 equivalent (si × 60/28) is subtracted from slag%
feo_in_slag: 0.4
si_in_slag:  0.5

# ── Slag constraint ───────────────────────────────────────────────
# Maximum allowable slag-forming material in the blend (MT)
# Slag = Σ(x_i × (SiO2_i + Al2O3_i + CaO_i + MgO_i + MnO_i) / 100)
target_slag_qty: 700.0

# ── Ore maximum % constraints (% of total blend) ──────────────────
# Cap how much any single ore can contribute to the blend
# Set to 100 to apply no cap for an ore
# fallback_max_pct applies if ore is not listed here
fallback_max_pct: 100.0

ore_max_pct:
  NMDC ROM:               30.0
  NMDC Donimalai:         15.0
  Bacheli Fines O/S:      10.0
  Lloyds Pellet (Sarda):  10.0
